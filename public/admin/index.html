<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Care N Cure Dental</title>
  <base href="/admin/" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      background: #f1f5f9;
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      width: 45%;
      background: linear-gradient(145deg, #1d4ed8 0%, #0f766e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      top: -100px; right: -100px;
    }
    .left-panel::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      bottom: -80px; left: -80px;
    }

    .brand {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .brand-icon {
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.15);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .brand-icon svg { width: 44px; height: 44px; }

    .brand h1 {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      margin-top: 6px;
    }

    .divider {
      width: 48px; height: 2px;
      background: rgba(255,255,255,0.3);
      margin: 24px auto;
      border-radius: 2px;
    }

    .features {
      list-style: none;
      text-align: left;
      width: 100%;
      max-width: 260px;
    }

    .features li {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      padding: 6px 0;
    }

    .features li span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      font-size: 11px;
      flex-shrink: 0;
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border: 1px solid #e2e8f0;
    }

    .login-card h2 {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .login-card .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      pointer-events: none;
      display: flex;
    }

    .input-wrap input {
      width: 100%;
      padding: 11px 42px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      color: #0f172a;
      outline: none;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .toggle-pwd {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      display: flex;
      padding: 2px;
      transition: color 0.15s;
    }

    .toggle-pwd:hover { color: #475569; }

    .error-msg {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .hidden { display: none !important; }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-login:hover { background: #1d4ed8; }
    .btn-login:active { transform: scale(0.98); }

    .secure-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .left-panel {
        width: 100%;
        padding: 32px 24px;
      }
      .features { display: none; }
      .divider { margin: 16px auto; }
      .right-panel { padding: 24px 16px; }
      .login-card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C9.5 2 7.5 3.5 6.5 5.5C5.5 4.5 4 4 4 4C4 4 4.5 6 5 7C4.5 8 4 9.5 4 11C4 15 5.5 19 7 21C7.5 22 8.5 22 9 21L10 18C10.5 17 11 16 12 16C13 16 13.5 17 14 18L15 21C15.5 22 16.5 22 17 21C18.5 19 20 15 20 11C20 9.5 19.5 8 19 7C19.5 6 20 4 20 4C20 4 18.5 4.5 17.5 5.5C16.5 3.5 14.5 2 12 2Z" fill="white"/>
        </svg>
      </div>
      <h1>Care N Cure</h1>
      <p>Multi-Speciality Dental Centre</p>
      <div class="divider"></div>
      <ul class="features">
        <li><span>📋</span> View all patient bookings</li>
        <li><span>✅</span> Mark appointments as done</li>
        <li><span>📅</span> Filter by date & status</li>
        <li><span>🔒</span> Secure admin access</li>
      </ul>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="login-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to the admin dashboard</p>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="username" placeholder="admin" required autocomplete="off" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="password" placeholder="••••••••" required />
            <button type="button" class="toggle-pwd" id="togglePwd" title="Show/hide password">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div id="loginError" class="error-msg hidden">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          Invalid username or password
        </div>

        <button type="submit" class="btn-login">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In
        </button>
      </form>

      <div class="secure-note">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Secure admin access only
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    firebase.initializeApp(firebaseConfig);
    const auth     = firebase.auth();
    const loginBtn = document.querySelector('.btn-login');
    const errorEl  = document.getElementById('loginError');

    // Redirect to dashboard if already signed in
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'dashboard.html';
    });

    // Show / hide password toggle
    document.getElementById('togglePwd').addEventListener('click', function () {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    });

    // Fixed email used internally for Firebase Auth
    const ADMIN_EMAIL = 'admin@carenncure.app';

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      errorEl.classList.add('hidden');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      if (username !== 'admin') {
        errorEl.textContent = 'Invalid username or password.';
        errorEl.classList.remove('hidden');
        loginBtn.disabled = false;
        loginBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In`;
        return;
      }

      try {
        await auth.signInWithEmailAndPassword(ADMIN_EMAIL, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        const msgs = {
          'auth/wrong-password':    'Invalid username or password.',
          'auth/user-not-found':    'Invalid username or password.',
          'auth/too-many-requests': 'Too many attempts. Try again later.',
          'auth/invalid-credential':'Invalid username or password.',
        };
        errorEl.textContent = msgs[err.code] || 'Login failed. Try again.';
        errorEl.classList.remove('hidden');
        document.getElementById('password').value = '';
        loginBtn.disabled = false;
        loginBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In`;
      }
    });
  </script>
</body>
</html>
